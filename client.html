<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicorn Destinations – Your Itinerary</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/pages/client.css">
</head>

<body>

    <!-- ── HERO ── -->
    <header class="hero">
        <div class="hero-badge">Personalised Itinerary</div>
        <div class="hero-logo-wrap">
            <img src="/assest/DESTINATION.png" alt="Unicorn Destinations Logo" class="hero-logo">
        </div>
        <h1 class="hero-title"><em>Unicorn</em> Destinations</h1>
        <div class="hero-divider">
            <div class="hero-diamond"></div>
        </div>
        <p class="hero-sub">Your Personalised Tour Itinerary</p>
        <div class="hero-scroll">
            <div class="scroll-line"></div>
            Scroll
        </div>
    </header>

    <!-- ── GOLD RIBBON ── -->
    <div class="ribbon">✦ &nbsp; Crafted Exclusively For You &nbsp; ✦</div>

    <!-- ── MAIN ── -->
    <main class="main" id="clientContent">

        <!-- Loading state -->
        <div class="loading-state" id="loadingState">
            <div class="loading-spinner"></div>
            <p>Loading your itinerary…</p>
        </div>

        <!-- Section header (shown after load) -->
        <div class="section-header fade-up" id="sectionHeader" style="display:none;">
            <p class="section-eyebrow">Day by Day</p>
            <h2 class="section-title">Your <em>Journey</em></h2>
            <div class="section-rule"><span></span></div>
        </div>

        <!-- Day Cards injected here -->
        <div id="daysList"></div>

        <!-- Admin action buttons injected here -->
        <div id="clientActions"></div>

    </main>

    <!-- ── FOOTER ── -->
    <footer>
        <div class="footer-logo-wrap">
            <img src="/assest/DESTINATION.png" alt="Unicorn Destinations" class="footer-logo">
        </div>
        <p class="footer-brand">Unicorn Destinations</p>
        <p class="footer-tagline">Crafting Journeys Worth Remembering</p>
        <div class="footer-rule"></div>
        <div class="footer-links">
            <a href="tel:8857955359">📞 8857955359</a>
            <a href="mailto:unicorndestinations@gmail.com">✉️ unicorndestinations@gmail.com</a>
        </div>
    </footer>

    <script type="module" src="/js/pages/client.js"></script>
</body>

</html>
